services:
  - type: web
    name: divine-iris-backend
    autoDeployTrigger: commit   # deploy on every push to the linked branch
    runtime: python
    region: singapore
    rootDir: backend
    buildCommand: pip install -r requirements-render.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    # Waits until Mongo responds before sending traffic (reduces 502s during deploy / wake)
    healthCheckPath: /api/health
    envVars:
      - key: MONGO_URL
        sync: false        # Set this in Render dashboard — your MongoDB Atlas connection string
      - key: DB_NAME
        value: divineIris  # Change if you used a different DB name in Atlas
      - key: HOST_URL
        sync: false        # Set to your Render backend URL e.g. https://divine-iris-backend.onrender.com
      - key: FRONTEND_URL
        sync: false        # Optional: public site URL for emails/reminders (e.g. https://divine-iris-frontend.onrender.com)
      - key: AWS_S3_BUCKET
        sync: false        # Bucket name; also set keys + AWS_REGION matching the bucket’s region
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        sync: false        # Must match bucket region (e.g. ap-southeast-1)
      - key: AWS_S3_USE_IAM_ROLE
        sync: false        # true on EC2/ECS with instance/task role (skip static keys)
      - key: AWS_S3_OBJECT_ACL
        sync: false        # Optional public-read; omit if bucket uses owner enforced + bucket policy for GetObject
      - key: AWS_S3_PUBLIC_BASE_URL
        sync: false        # Optional: CloudFront or website endpoint, no trailing slash
      - key: AWS_S3_PREFIX
        sync: false        # Optional; default uploads — use same prefix in bucket policy Resource
      - key: AWS_S3_ADDRESSING_STYLE
        sync: false        # Optional path | virtual for S3-compatible APIs
      - key: REQUIRE_S3_FOR_UPLOADS
        sync: false        # Optional: true = uploads must use S3 only (no local fallback). Recommended on Render with AWS fully configured.
      - key: S3_URL_FOR_BROWSER
        value: direct      # Native https://bucket.s3... URLs (recommended). Use api + HOST_URL only if the bucket must stay private.
      - key: PYTHON_VERSION
        value: 3.11.0

  # Static site: deploys swap assets with minimal user impact; service worker + GET retries
  # cover blips. A single free API instance can still pause briefly on backend deploy — unavoidable without paid multi-instance.
  - type: web
    name: divine-iris-frontend
    autoDeployTrigger: commit   # deploy on every push to the linked branch
    runtime: static
    region: singapore
    rootDir: frontend
    buildCommand: yarn install && yarn build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_BACKEND_URL
        sync: false        # Set this in Render dashboard — your backend URL e.g. https://divine-iris-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
