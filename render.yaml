services:
  - type: web
    name: divine-iris-backend
    autoDeployTrigger: commit   # deploy on every push to the linked branch
    runtime: python
    region: singapore
    rootDir: backend
    buildCommand: pip install -r requirements-render.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false        # Set this in Render dashboard — your MongoDB Atlas connection string
      - key: DB_NAME
        value: divineIris  # Change if you used a different DB name in Atlas
      - key: HOST_URL
        sync: false        # Set to your Render backend URL e.g. https://divine-iris-backend.onrender.com
      - key: AWS_S3_BUCKET
        sync: false        # Optional: enables S3 for uploads (images, videos, payment proofs). Also set AWS keys + region.
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        sync: false        # e.g. ap-southeast-1; default in code if unset
      - key: AWS_S3_PUBLIC_BASE_URL
        sync: false        # Optional: CloudFront or custom origin URL (no trailing slash)
      - key: AWS_S3_PREFIX
        sync: false        # Optional: S3 key prefix, default uploads
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: web
    name: divine-iris-frontend
    autoDeployTrigger: commit   # deploy on every push to the linked branch
    runtime: static
    region: singapore
    rootDir: frontend
    buildCommand: yarn install && yarn build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_BACKEND_URL
        sync: false        # Set this in Render dashboard — your backend URL e.g. https://divine-iris-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
